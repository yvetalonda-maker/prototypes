<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Projekty</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222632;
      --border: #2a2e3b;
      --text: #e4e6ed;
      --text-muted: #8b8fa3;
      --text-dim: #5a5e70;
      --accent: #7c6cf0;
      --accent-soft: rgba(124, 108, 240, 0.12);
      --green: #34d399;
      --green-soft: rgba(52, 211, 153, 0.12);
      --yellow: #fbbf24;
      --yellow-soft: rgba(251, 191, 36, 0.12);
      --orange: #f97316;
      --orange-soft: rgba(249, 115, 22, 0.12);
      --blue: #60a5fa;
      --blue-soft: rgba(96, 165, 250, 0.12);
      --red: #f87171;
      --red-soft: rgba(248, 113, 113, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px;
    }

    /* ── Header ─────────────────────────── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
    .header-meta { font-size: 13px; color: var(--text-dim); }

    /* ── Stats ──────────────────────────── */
    .stats-row { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 16px; font-size: 13px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .stat-chip .num { font-weight: 600; color: var(--text); }

    /* ── Section ────────────────────────── */
    .section { margin-bottom: 36px; }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .section-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .section-title.work { color: var(--text-muted); }
    .section-title.personal { color: var(--accent); }
    .section-title.ai-learning { color: var(--yellow); }
    .section-count { font-size: 12px; color: var(--text-dim); }

    /* ── Grid ───────────────────────────── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .grid-compact { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

    /* ── Card ───────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: border-color 0.15s, transform 0.15s;
      cursor: default; display: flex; flex-direction: column; gap: 14px;
    }
    .card:hover { border-color: var(--text-dim); transform: translateY(-1px); }

    /* Personal cards — subtler */
    .card.personal {
      background: var(--bg);
      border-style: dashed;
    }

    /* AI learning cards — compact */
    .card.compact {
      padding: 14px;
      gap: 10px;
    }
    .card.compact .card-name { font-size: 14px; }
    .card.compact .card-goal { font-size: 12px; }

    /* Done cards — collapsed */
    .card.done {
      padding: 12px 16px;
      gap: 0;
      opacity: 0.5;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }
    .card.done:hover { opacity: 0.8; }
    .card.done .card-top { gap: 8px; }
    .card.done .card-name { font-size: 13px; }
    .card.done .card-goal,
    .card.done .card-meta,
    .card.done .time-bar,
    .card.done .card-notes,
    .card.done .card-expand-hint { display: none; }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
    }
    .card-name { font-size: 16px; font-weight: 600; line-height: 1.3; }

    .status-badge {
      flex-shrink: 0; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      padding: 3px 10px; border-radius: 12px; white-space: nowrap;
    }
    .status-probiha { background: var(--green-soft); color: var(--green); }
    .status-nezacato { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
    .status-castecne { background: var(--yellow-soft); color: var(--yellow); }
    .status-pozastaveno { background: var(--orange-soft); color: var(--orange); }
    .status-hotovo { background: var(--blue-soft); color: var(--blue); }

    .card-goal { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .card-goal strong { color: var(--text); font-weight: 500; }

    .card-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-dim); }
    .card-meta-item { display: flex; align-items: center; gap: 4px; }
    .card-meta-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-fresh { background: var(--green); }
    .dot-recent { background: var(--yellow); }
    .dot-stale { background: var(--orange); }
    .dot-cold { background: var(--red); }
    .dot-none { background: var(--text-dim); }

    .extra-stat {
      background: var(--accent-soft); color: var(--accent);
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 10px;
      display: inline-flex; align-items: center; gap: 4px;
    }

    .time-bar { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .time-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* ── Sub-projects (prototypes) ──────── */
    .sub-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 4px;
    }
    .sub-chip {
      font-size: 11px; padding: 4px 10px; border-radius: 8px;
      border: 1px solid var(--border); color: var(--text-dim);
      display: flex; align-items: center; gap: 5px;
      text-decoration: none;
    }
    .sub-chip .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .sub-chip.live { border-color: var(--green); color: var(--green); border-style: solid; }
    a.sub-chip.live { cursor: pointer; transition: background 0.15s; }
    a.sub-chip.live:hover { background: var(--green-soft); }
    .sub-chip.mock { border-color: var(--text-dim); }
    .sub-chip.placeholder { opacity: 0.4; }
    .sub-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }

    /* ── Notes (expandable) ────────────── */
    .card-notes {
      font-size: 12px; color: var(--text-dim); line-height: 1.5;
      border-top: 1px solid var(--border); padding-top: 12px; display: none;
    }
    .card.expanded .card-notes { display: block; }
    .card-expand-hint {
      font-size: 11px; color: var(--text-dim); opacity: 0;
      transition: opacity 0.15s; text-align: right;
    }
    .card:hover .card-expand-hint { opacity: 1; }

    /* ── Priority ribbon ─────────────────── */
    .card.priority {
      border-color: var(--orange);
      overflow: hidden;
      position: relative;
    }
    .priority-ribbon {
      background: var(--orange);
      color: var(--bg);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 0;
      text-align: center;
      margin: -20px -20px 8px -20px;
    }
    .card.compact .priority-ribbon {
      margin: -14px -14px 6px -14px;
    }

    /* ── Copy path button ────────────────── */
    .copy-path {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-dim);
      cursor: pointer; transition: all 0.15s;
      margin-left: 8px;
    }
    .copy-path:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .copy-path svg { width: 14px; height: 14px; }

    /* ── Toast ──────────────────────────── */
    .toast-notification {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--accent);
      color: var(--accent); font-size: 13px; font-weight: 500;
      padding: 8px 20px; border-radius: 20px;
      opacity: 0; transition: all 0.3s ease;
      pointer-events: none; z-index: 100;
    }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }

    @media (max-width: 600px) {
      body { padding: 16px; }
      .grid, .grid-compact { grid-template-columns: 1fr; }
      .header h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Moje projekty</h1>
    <div class="header-meta" id="generated"></div>
  </div>

  <div class="stats-row" id="stats"></div>

  <div id="sections"></div>
  <div class="toast-notification" id="toast"></div>

  <script>
    const STATUS_MAP = {
      'probíhá': { css: 'status-probiha', label: 'Probíhá', order: 0 },
      'částečně hotovo': { css: 'status-castecne', label: 'Částečně', order: 1 },
      'pozastaveno': { css: 'status-pozastaveno', label: 'Pozastaveno', order: 2 },
      'nezačato': { css: 'status-nezacato', label: 'Nezačato', order: 3 },
      'hotovo': { css: 'status-hotovo', label: 'Hotovo', order: 4 },
    };

    const SECTION_META = {
      'work':        { title: 'Pracovní', css: 'work' },
      'ai-learning': { title: 'AI & Learning', css: 'ai-learning' },
      'personal':    { title: 'Osobní', css: 'personal' },
    };

    const SECTION_ORDER = ['work', 'ai-learning', 'personal'];

    function ageDot(days) {
      if (days === null || days === undefined) return 'dot-none';
      if (days <= 2) return 'dot-fresh';
      if (days <= 7) return 'dot-recent';
      if (days <= 14) return 'dot-stale';
      return 'dot-cold';
    }

    function ageLabel(days) {
      if (days === null || days === undefined) return 'nikdy';
      if (days === 0) return 'dnes';
      if (days === 1) return 'včera';
      return `${days}d`;
    }

    function timeBarPercent(spent, estimate) {
      function parseHours(s) {
        if (!s) return null;
        s = s.replace('~', '').replace('h', '').trim();
        if (s.includes('–') || s.includes('-')) {
          const parts = s.split(/[–-]/);
          return (parseFloat(parts[0]) + parseFloat(parts[1])) / 2;
        }
        const n = parseFloat(s);
        return isNaN(n) ? null : n;
      }
      const s = parseHours(spent);
      const e = parseHours(estimate);
      if (!s || !e || e === 0) return null;
      return Math.min(100, Math.round((s / e) * 100));
    }

    function timeBarColor(pct) {
      if (pct >= 90) return 'var(--red)';
      if (pct >= 60) return 'var(--yellow)';
      return 'var(--green)';
    }

    function sortProjects(projects) {
      return [...projects].sort((a, b) => {
        // Priority first
        if (a.priority && !b.priority) return -1;
        if (!a.priority && b.priority) return 1;
        const oa = STATUS_MAP[a.status]?.order ?? 99;
        const ob = STATUS_MAP[b.status]?.order ?? 99;
        if (oa !== ob) return oa - ob;
        const da = a.daysSinceWork ?? 9999;
        const db = b.daysSinceWork ?? 9999;
        return da - db;
      });
    }

    function renderSubProjects(subs) {
      if (!subs || subs.length === 0) return '';

      const live = subs.filter(s => s.kind === 'live');
      const mocks = subs.filter(s => s.kind === 'mocks');

      function chipClass(s) {
        if (s.status === 'placeholder') return 'sub-chip placeholder';
        if (s.kind === 'live') return 'sub-chip live';
        return 'sub-chip mock';
      }

      function prettyName(s) {
        return s.name.replace(/^\d{4}-\d{2}-\d{2}-/, '');
      }

      function renderChip(s) {
        const cls = chipClass(s);
        const name = prettyName(s);
        const dot = `<span class="dot ${ageDot(s.daysSince)}"></span>`;
        const suffix = s.status === 'placeholder' ? ' (empty)' : '';
        if (s.url) {
          return `<a class="${cls}" href="${s.url}" target="_blank" onclick="event.stopPropagation()">${dot} ${name}${suffix}</a>`;
        }
        return `<span class="${cls}">${dot} ${name}${suffix}</span>`;
      }

      let html = '<div style="margin-top: 4px">';

      if (live.length) {
        html += `<div class="sub-label">Live prototypy</div><div class="sub-grid">`;
        html += live.map(renderChip).join('');
        html += '</div>';
      }

      if (mocks.length) {
        html += `<div class="sub-label" style="margin-top: 8px">Mocks</div><div class="sub-grid">`;
        html += mocks.map(renderChip).join('');
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function renderCard(p) {
      const isDone = p.status === 'hotovo';
      const isCompact = p.category === 'ai-learning';
      const isPersonal = p.category === 'personal';
      const statusInfo = STATUS_MAP[p.status] || { css: 'status-nezacato', label: p.status };
      const pct = timeBarPercent(p.spent, p.estimate);

      const hasLocation = p.location && p.location !== '—';
      const classes = ['card'];
      if (isDone) classes.push('done');
      if (isCompact && !isDone) classes.push('compact');
      if (isPersonal) classes.push('personal');
      if (p.priority && !isDone) classes.push('priority');

      if (isDone) {
        return `
          <div class="${classes.join(' ')}">
            <div class="card-top">
              <div class="card-name">${p.name}</div>
              <span class="status-badge ${statusInfo.css}">${statusInfo.label}</span>
            </div>
          </div>
        `;
      }

      return `
        <div class="${classes.join(' ')}" onclick="this.classList.toggle('expanded')">
          ${p.priority ? '<div class="priority-ribbon">PRIORITY</div>' : ''}
          <div class="card-top">
            <div class="card-name">${p.name}${hasLocation ? `<button class="copy-path" onclick="event.stopPropagation(); copyPath('${p.location.replace(/'/g, "\\'")}')" title="${p.location}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></button>` : ''}</div>
            <span class="status-badge ${statusInfo.css}">${statusInfo.label}</span>
          </div>

          <div class="card-goal">
            <strong>Cíl:</strong> ${p.shortGoal || p.longGoal || '—'}
          </div>

          <div class="card-meta">
            <div class="card-meta-item">
              <span class="dot ${ageDot(p.daysSinceWork)}"></span>
              ${ageLabel(p.daysSinceWork)}
            </div>
            <div class="card-meta-item">${p.spent || '0 h'} / ${p.estimate || '?'}</div>
            ${p.extraStat ? `<span class="extra-stat">${p.extraStat.value} ${p.extraStat.label}</span>` : ''}
          </div>

          ${pct !== null ? `
            <div class="time-bar">
              <div class="time-bar-fill" style="width: ${pct}%; background: ${timeBarColor(pct)}"></div>
            </div>
          ` : ''}

          ${p.subProjects ? renderSubProjects(p.subProjects) : ''}

          ${p.notes ? `
            <div class="card-notes">${p.notes}</div>
            <div class="card-expand-hint">klikni pro detaily</div>
          ` : ''}
        </div>
      `;
    }

    function render(data) {
      // Header
      const gen = new Date(data.generated);
      document.getElementById('generated').textContent =
        `Aktualizováno: ${gen.toLocaleDateString('cs-CZ')} ${gen.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' })}`;

      // Stats
      const counts = {};
      data.projects.forEach(p => {
        const s = p.status || 'nezačato';
        counts[s] = (counts[s] || 0) + 1;
      });
      document.getElementById('stats').innerHTML = `
        <div class="stat-chip"><span class="num">${data.totalProjects}</span> projektů celkem</div>
        ${Object.entries(counts).map(([k, v]) =>
          `<div class="stat-chip"><span class="num">${v}</span> ${k}</div>`
        ).join('')}
      `;

      // Group by category
      const grouped = {};
      data.projects.forEach(p => {
        const cat = p.category || 'work';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(p);
      });

      // Render sections
      const sectionsEl = document.getElementById('sections');
      let html = '';

      for (const cat of SECTION_ORDER) {
        const projects = grouped[cat];
        if (!projects || projects.length === 0) continue;

        const meta = SECTION_META[cat] || { title: cat, css: 'work' };
        const sorted = sortProjects(projects);
        const active = sorted.filter(p => p.status !== 'hotovo');
        const done = sorted.filter(p => p.status === 'hotovo');
        const isCompact = cat === 'ai-learning';

        html += `<div class="section">`;
        html += `<div class="section-header">
          <div class="section-title ${meta.css}">${meta.title}</div>
          <div class="section-count">${projects.length} projekt${projects.length === 1 ? '' : 'ů'}</div>
        </div>`;

        html += `<div class="grid ${isCompact ? 'grid-compact' : ''}">`;
        html += active.map(renderCard).join('');
        html += done.map(renderCard).join('');
        html += `</div></div>`;
      }

      sectionsEl.innerHTML = html;
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function copyPath(location) {
      navigator.clipboard.writeText(location).then(() => {
        showToast('Zkopírováno: ' + location);
      });
    }
